<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Westgolf Y39-2-20 — Revenue Forecast 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--s1:#141414;--s2:#1a1a1a;--s3:#222;
  --b1:#2a2a2a;--b2:#333;
  --gold:#c9a84c;--gold2:#e8c97a;
  --text:#f5f3ee;--muted:#666;--muted2:#999;
  --blue:#4a9fd4;--green:#3dba77;--red:#e05c5c;
}
body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;min-height:100vh}

/* LOADING */
#loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;z-index:999;
}
#loading.hide{display:none}
.load-logo{opacity:.8;height:40px}
.load-ring{width:48px;height:48px;border:2px solid var(--b2);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-msg{font-size:13px;color:var(--muted2);letter-spacing:.04em}
.load-prog{font-size:11px;color:var(--gold)}

/* REPORT — hidden until loaded */
#report{display:none}
#report.show{display:block}

/* STICKY HEADER */
.rh{background:rgba(13,13,13,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);
    padding:18px 40px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100}
.rh img{height:28px;opacity:.85}
.rh-center{text-align:center}
.rh-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.03em}
.rh-sub{font-size:11px;color:var(--muted);margin-top:1px}
.btn-pdf{background:transparent;border:1px solid var(--b2);color:var(--muted2);border-radius:8px;
         padding:8px 18px;font-size:12px;font-family:Inter,sans-serif;cursor:pointer;transition:.18s}
.btn-pdf:hover{border-color:var(--gold);color:var(--gold)}

/* BODY */
.body{padding:40px;max-width:1100px;margin:0 auto}

/* HERO */
.hero{
  background:linear-gradient(135deg,var(--s2),var(--s1));
  border:1px solid var(--b2);border-radius:20px;padding:36px 40px;margin-bottom:28px;
  display:grid;grid-template-columns:1fr auto;gap:32px;align-items:center;
  position:relative;overflow:hidden;
}
.hero::before{content:"";position:absolute;top:-80px;right:-80px;width:300px;height:300px;
  background:radial-gradient(circle,rgba(201,168,76,.09) 0%,transparent 70%)}
.h-badge{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.h-title{font-family:"Playfair Display",serif;font-size:30px;font-weight:700;color:var(--text);line-height:1.15;margin-bottom:6px}
.h-sub{font-size:13px;color:var(--muted2);margin-bottom:14px}
.h-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,.1);
        border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:5px 14px;
        font-size:11px;color:var(--gold);font-weight:600;letter-spacing:.04em}
.h-stats{display:flex;gap:28px;flex-shrink:0}
.hs{text-align:right}
.hs-val{font-family:"Playfair Display",serif;font-size:24px;color:var(--gold2);line-height:1}
.hs-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.kpi{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:20px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:2px}
.kpi.gold::before{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.kpi.blue::before{background:linear-gradient(90deg,#1a6b9a,var(--blue))}
.kpi.green::before{background:linear-gradient(90deg,#1d7a4f,var(--green))}
.kpi.gray::before{background:linear-gradient(90deg,#444,#666)}
.kpi-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.kpi-val{font-family:"Playfair Display",serif;font-size:24px;line-height:1;margin-bottom:4px}
.kpi.gold .kpi-val{color:var(--gold2)}
.kpi.blue .kpi-val{color:var(--blue)}
.kpi.green .kpi-val{color:var(--green)}
.kpi.gray .kpi-val{color:var(--muted2)}
.kpi-sub{font-size:11px;color:var(--muted)}

/* INSIGHTS */
.ins-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
.ins{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:20px}
.ins-icon{font-size:20px;margin-bottom:8px}
.ins-big{font-family:"Playfair Display",serif;font-size:18px;color:var(--gold);margin-bottom:4px}
.ins-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.ins-body{font-size:12px;color:var(--muted2);line-height:1.6}

/* SECTION */
.sec{margin-bottom:28px}
.sec-title{font-family:"Playfair Display",serif;font-size:18px;color:var(--text);margin-bottom:4px}
.sec-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
.card{background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:22px}
.card canvas{max-height:260px}

/* TABLE */
.ft{width:100%;border-collapse:collapse;font-size:13px}
.ft thead{background:rgba(201,168,76,.07)}
.ft th{text-align:left;padding:12px 16px;font-size:10px;font-weight:700;letter-spacing:.12em;
       text-transform:uppercase;color:var(--gold);border-bottom:1px solid var(--b2)}
.ft td{padding:13px 16px;border-bottom:1px solid var(--b1);color:var(--text)}
.ft tr:last-child td{border-bottom:none}
.ft tr:hover td{background:var(--s3)}
.ft tr.total td{border-top:2px solid var(--b2);font-weight:700}
.egp{color:var(--gold2);font-weight:700}
.usd{color:var(--blue);font-weight:700}
.dim{color:var(--muted2)}
.ob{display:flex;align-items:center;gap:8px}
.ob-bar{flex:1;height:5px;background:var(--b2);border-radius:3px;overflow:hidden;max-width:70px}
.ob-fill{height:100%;border-radius:3px;background:var(--gold)}
.oh{color:var(--green);font-weight:700}
.om{color:var(--gold);font-weight:700}
.ol{color:var(--red);font-weight:700}

/* SEASON BARS */
.sb-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;align-items:flex-end}
.sb-col{display:flex;flex-direction:column;align-items:center;gap:5px}
.sb-outer{width:100%;height:90px;background:var(--b1);border-radius:5px;display:flex;align-items:flex-end;overflow:hidden}
.sb-inner{width:100%;background:linear-gradient(180deg,var(--gold2),var(--gold));border-radius:5px;transition:height .5s ease}
.sb-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.06em}
.sb-pct{font-size:10px;color:var(--gold2);font-weight:700}

/* DISCLAIMER */
.disc{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:16px 18px;
      font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:28px}
.disc strong{color:var(--muted2)}

/* FOOTER */
.foot{display:flex;align-items:center;justify-content:space-between;
      padding-top:20px;border-top:1px solid var(--b1)}
.foot img{height:18px;opacity:.3}
.foot-txt{font-size:11px;color:var(--muted);text-align:right;line-height:1.6}

@media print{
  .rh .btn-pdf{display:none}
  body,.rh,#report{background:#fff!important;color:#000!important}
  .hero,.kpi,.ins,.card,.ft thead{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sec{break-inside:avoid}
}
@media(max-width:768px){
  .body,.rh{padding-left:18px;padding-right:18px}
  .kpi-row,.ins-row{grid-template-columns:1fr 1fr}
  .hero{grid-template-columns:1fr}
  .h-stats{flex-direction:row;gap:20px}
  .hs{text-align:left}
  .sb-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD/9k=" alt="Sadafa">
    <div class="rh-center">
      <div class="rh-title">Revenue Forecast — Westgolf Y39·2·20</div>
      <div class="rh-sub" id="rh-sub"></div>
    </div>
    <button class="btn-pdf" onclick="window.print()">⬇ Save as PDF</button>
  </div>
  <div class="body" id="body"></div>
</div>

<script>
const TOKEN = "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";
const MONTH_DBS = {
  "Sep 2025":"24ec90a9c007801ea54bf04424e0d20a",
  "Oct 2025":"282c90a9c00781fabf77cc267fa0dc1d",
  "Nov 2025":"29dc90a9c0078094b24ed1eb920b4e9b",
  "Dec 2025":"2b7c90a9c00780eba718f524e93f41f8",
  "Jan 2026":"2dac90a9c00780358fdee565befdf5a5",
  "Feb 2026":"2f9c90a9c00780359237d67446949bfc",
  "Mar 2026":"314c90a9c00781258a52e8ea10616d7c",
  "Apr 2026":"b7dc90a9c0078392a77a0124767bd463",
};
const DAYS = {
  "Sep 2025":30,"Oct 2025":31,"Nov 2025":30,"Dec 2025":31,
  "Jan 2026":31,"Feb 2026":28,"Mar 2026":31,"Apr 2026":30,
  "May 2026":31,"Jun 2026":30,"Jul 2026":31,"Aug 2026":31,
  "Sep 2026":30,"Nov 2026":30,"Dec 2026":31,
};
const FMONTHS = ["May 2026","Jun 2026","Jul 2026","Aug 2026","Sep 2026","Nov 2026","Dec 2026"];
const AMONTHS = Object.keys(MONTH_DBS);
const UNIT = "Westgolf Y39-2-20";

async function nFetch(url,opts){
  const WORKER = "https://blue-unit-32c2.alaa020498.workers.dev";
  const r = await fetch(WORKER+"?url="+encodeURIComponent(url),{
    method: opts.method,
    body: opts.body,
  });
  if(!r.ok) throw new Error("Worker error: "+r.status);
  return r.json();
}

async function qAll(dbId){
  const rows=[];let cur=null;
  do{
    const b={page_size:100};if(cur)b.start_cursor=cur;
    const d=await nFetch(`https://api.notion.com/v1/databases/${dbId}/query`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${TOKEN}`,"Content-Type":"application/json","Notion-Version":"2022-06-28"},
      body:JSON.stringify(b)
    });
    (d.results||[]).forEach(p=>rows.push(p));
    cur=d.has_more?d.next_cursor:null;
  }while(cur);
  return rows;
}

function parse(p){
  const r=p.properties||{};
  return{unit:r["Listing Name"]?.select?.name||"",ci:r["Check-in Date"]?.date?.start||"",
    co:r["Check-out Date"]?.date?.start||"",price:r["Total Price"]?.number||0,cur:r["Currency"]?.select?.name||"EGP"};
}
function nts(a,b){return!a||!b?0:Math.max(0,Math.round((new Date(b)-new Date(a))/86400000))}
function fE(n){return"EGP "+Math.round(n).toLocaleString()}
function fN(n){return Math.round(n).toLocaleString()}

// AUTO-RUN on page load
window.addEventListener("load",async()=>{
  const prog=document.getElementById("lprog");
  const msgs=["Connecting to data source…","Fetching reservations…","Analyzing seasonal trends…","Computing occupancy rates…","Building forecast model…","Almost ready…"];
  let mi=0;
  const tick=setInterval(()=>{prog.textContent=msgs[Math.min(mi++,msgs.length-1)]},2200);

  const allData={};
  const months=AMONTHS;
  for(let i=0;i<months.length;i++){
    try{
      const rows=await qAll(MONTH_DBS[months[i]]);
      allData[months[i]]=rows.map(parse).filter(r=>r.unit&&r.ci);
    }catch(e){allData[months[i]]=[];}
  }
  clearInterval(tick);
  // Check if we got any data at all
  const hasData = Object.values(allData).some(rows => rows.length > 0);
  if(!hasData){
    document.getElementById('lprog').textContent = 'Connection failed. Retrying...';
    // Try once more after 2 seconds
    setTimeout(async()=>{
      for(let i=0;i<months.length;i++){
        if((allData[months[i]]||[]).length===0){
          try{
            const rows=await qAll(MONTH_DBS[months[i]]);
            allData[months[i]]=rows.map(parse).filter(r=>r.unit&&r.ci);
          }catch(e){}
        }
      }
      const hasData2=Object.values(allData).some(rows=>rows.length>0);
      if(hasData2){render(allData);}
      else{
        document.querySelector('.load-msg').textContent='Could not load data';
        document.getElementById('lprog').innerHTML='<span style="color:#e05c5c">Please check your internet connection and refresh the page</span>';
      }
    },2000);
    return;
  }
  render(allData);
});

function render(allData){
  // ── Westgolf actual ──
  const wA={};
  AMONTHS.forEach(m=>{
    const rows=(allData[m]||[]).filter(r=>r.unit===UNIT);
    const egp=rows.filter(r=>r.cur==="EGP").reduce((s,r)=>s+r.price,0);
    const usd=rows.filter(r=>r.cur==="USD").reduce((s,r)=>s+r.price,0);
    const n=rows.reduce((s,r)=>s+nts(r.ci,r.co),0);
    wA[m]={egp,usd,nights:n,bookings:rows.length,
      occ:Math.round(n/(DAYS[m]||30)*100),
      ppnE:n>0&&egp>0?egp/n:0,ppnU:n>0&&usd>0?usd/n:0};
  });

  // ── Seasonal index ──
  const units=new Set();
  AMONTHS.forEach(m=>(allData[m]||[]).forEach(r=>{if(r.unit)units.add(r.unit)}));
  const mOcc={};
  AMONTHS.forEach(m=>{
    const occs=[...units].map(u=>{
      const n=(allData[m]||[]).filter(r=>r.unit===u).reduce((s,r)=>s+nts(r.ci,r.co),0);
      return n/(DAYS[m]||30);
    });
    mOcc[m]=occs.length?occs.reduce((s,v)=>s+v,0)/occs.length:0;
  });
  const oa=Object.values(mOcc).reduce((s,v)=>s+v,0)/AMONTHS.length||1;
  const si={};AMONTHS.forEach(m=>{si[m.slice(0,3)]=(mOcc[m]||0)/oa});

  // ── Baselines ──
  const avgN=AMONTHS.reduce((s,m)=>s+wA[m].nights,0)/AMONTHS.length;
  const eMs=AMONTHS.filter(m=>wA[m].ppnE>0);
  const uMs=AMONTHS.filter(m=>wA[m].ppnU>0);
  const ppnE=eMs.length?eMs.reduce((s,m)=>s+wA[m].ppnE,0)/eMs.length:0;
  const ppnU=uMs.length?uMs.reduce((s,m)=>s+wA[m].ppnU,0)/uMs.length:0;
  const tEN=eMs.reduce((s,m)=>s+wA[m].nights,0);
  const tUN=uMs.reduce((s,m)=>s+wA[m].nights,0);
  const tN=tEN+tUN||1;
  const eR=tEN/tN,uR=tUN/tN;

  // ── Forecast ──
  const wF={};
  FMONTHS.forEach(m=>{
    const k=m.slice(0,3);
    const idx=si[k]!==undefined?si[k]:oa;
    const fn=Math.min(Math.round(avgN*idx),DAYS[m]||30);
    wF[m]={nights:fn,egp:Math.round(fn*eR*ppnE),usd:Math.round(fn*uR*ppnU),
           occ:Math.round(fn/(DAYS[m]||30)*100),bookings:Math.max(1,Math.round(fn/6))};
  });

  // ── Totals ──
  const tFE=FMONTHS.reduce((s,m)=>s+wF[m].egp,0);
  const tFU=FMONTHS.reduce((s,m)=>s+wF[m].usd,0);
  const tFN=FMONTHS.reduce((s,m)=>s+wF[m].nights,0);
  const tFD=FMONTHS.reduce((s,m)=>s+(DAYS[m]||30),0);
  const avgO=Math.round(tFN/tFD*100);
  const peak=FMONTHS.reduce((a,b)=>wF[a].nights>wF[b].nights?a:b);
  const slow=FMONTHS.reduce((a,b)=>wF[a].nights<wF[b].nights?a:b);
  const tBk=FMONTHS.reduce((s,m)=>s+wF[m].bookings,0);
  const avgMo=Math.round(tFE/FMONTHS.length);

  // ── Chart data ──
  const allM=[...AMONTHS,...FMONTHS];
  const cEgp=allM.map(m=>m in wA?wA[m].egp:wF[m]?.egp||0);
  const cOcc=allM.map(m=>m in wA?wA[m].occ:wF[m]?.occ||0);
  const sp=AMONTHS.length;
  const siVals=Object.entries(si);
  const maxSi=Math.max(...siVals.map(e=>e[1]),1);

  const genDate=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  document.getElementById("rh-sub").textContent=`May 2026 – December 2026 · ${genDate}`;

  document.getElementById("body").innerHTML=`
  <div class="hero">
    <div>
      <div class="h-badge">Revenue Forecast Report</div>
      <div class="h-title">Westgolf Y39·2·20</div>
      <div class="h-sub">El Gouna · Westgolf Village · Property Management Report</div>
      <div class="h-pill">📅 May 2026 → December 2026</div>
    </div>
    <div class="h-stats">
      <div class="hs"><div class="hs-val">${fE(tFE)}</div><div class="hs-lbl">Projected EGP</div></div>
      <div class="hs"><div class="hs-val">$${fN(tFU)}</div><div class="hs-lbl">Projected USD</div></div>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi gold"><div class="kpi-lbl">Total Forecast EGP</div><div class="kpi-val">${fE(tFE)}</div><div class="kpi-sub">May – Dec 2026 · 7 months</div></div>
    <div class="kpi blue"><div class="kpi-lbl">Total Forecast USD</div><div class="kpi-val">$${fN(tFU)}</div><div class="kpi-sub">May – Dec 2026 · 7 months</div></div>
    <div class="kpi green"><div class="kpi-lbl">Avg Occupancy</div><div class="kpi-val">${avgO}%</div><div class="kpi-sub">${tFN} projected nights</div></div>
    <div class="kpi gray"><div class="kpi-lbl">Est. Bookings</div><div class="kpi-val">${tBk}</div><div class="kpi-sub">Across 7 months</div></div>
  </div>

  <div class="ins-row">
    <div class="ins"><div class="ins-icon">📈</div><div class="ins-big">${peak}</div><div class="ins-title">Peak Month</div><div class="ins-body">Highest demand at ${wF[peak].occ}% occupancy with ~${wF[peak].nights} booked nights projected.</div></div>
    <div class="ins"><div class="ins-icon">💰</div><div class="ins-big">${fE(avgMo)}</div><div class="ins-title">Monthly Avg Revenue</div><div class="ins-body">Expected average monthly EGP revenue across the 7-month forecast period.</div></div>
    <div class="ins"><div class="ins-icon">📅</div><div class="ins-big">${slow}</div><div class="ins-title">Softest Month</div><div class="ins-body">Lowest demand at ${wF[slow].occ}% occupancy — good window for maintenance or owner stays.</div></div>
  </div>

  <div class="sec">
    <div class="sec-title">Revenue & Occupancy Trend</div>
    <div class="sec-sub">EGP revenue per month · historical baseline + forecast projection</div>
    <div class="card"><canvas id="mc"></canvas></div>
  </div>

  <div class="sec">
    <div class="sec-title">Month-by-Month Forecast</div>
    <div class="sec-sub">Projected performance May through December 2026</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="ft">
        <thead><tr><th>Month</th><th>Proj. Nights</th><th>Occupancy</th><th>Revenue (EGP)</th><th>Revenue (USD)</th><th>Est. Bookings</th></tr></thead>
        <tbody>
          ${FMONTHS.map(m=>{const d=wF[m];const oc=d.occ>=60?"oh":d.occ>=35?"om":"ol";return`<tr>
            <td style="font-weight:600">${m}</td>
            <td class="dim">~${d.nights}n</td>
            <td><div class="ob"><div class="ob-bar"><div class="ob-fill" style="width:${d.occ}%"></div></div><span class="${oc}">${d.occ}%</span></div></td>
            <td class="egp">${d.egp>0?fE(d.egp):"—"}</td>
            <td class="usd">${d.usd>0?"$"+fN(d.usd):"—"}</td>
            <td class="dim">~${d.bookings}</td></tr>`}).join("")}
          <tr class="total">
            <td style="color:var(--gold)">Total</td>
            <td class="dim">~${tFN}n</td>
            <td><div class="ob"><div class="ob-bar"><div class="ob-fill" style="width:${avgO}%"></div></div><span class="${avgO>=60?"oh":avgO>=35?"om":"ol"}">${avgO}%</span></div></td>
            <td class="egp">${fE(tFE)}</td>
            <td class="usd">${tFU>0?"$"+fN(tFU):"—"}</td>
            <td class="dim">~${tBk}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">Seasonal Demand Pattern</div>
    <div class="sec-sub">Market-wide occupancy index used to calibrate monthly projections</div>
    <div class="card">
      <div class="sb-grid">
        ${siVals.map(([name,idx])=>`<div class="sb-col">
          <div class="sb-pct">${Math.round(idx*100)}%</div>
          <div class="sb-outer"><div class="sb-inner" style="height:${Math.round(idx/maxSi*100)}%"></div></div>
          <div class="sb-lbl">${name}</div>
        </div>`).join("")}
      </div>
    </div>
  </div>

  <div class="disc"><strong>Methodology:</strong> Forecast uses Westgolf Y39-2-20's historical average nightly rate
  ${ppnE>0?"(EGP "+Math.round(ppnE).toLocaleString()+"/night)":""} ${ppnU>0?"($"+Math.round(ppnU)+"/night)":""} 
  combined with a seasonal demand index derived from ${units.size} properties across 8 months of data.
  These are indicative projections. Actual results may vary based on pricing and market conditions.</div>

  <div class="foot">
    <img src="data:image/png;base64,${logo_b64}" alt="Sadafa">
    <div class="foot-txt">
      <div>Sadafa Property Management · ${genDate}</div>
      <div>Confidential — Prepared for property owner</div>
    </div>
  </div>`;

  // Chart
  setTimeout(()=>{
    const ctx=document.getElementById("mc").getContext("2d");
    new Chart(ctx,{type:"bar",data:{
      labels:allM,
      datasets:[
        {label:"EGP Revenue",data:cEgp,yAxisID:"y",
         backgroundColor:allM.map((_,i)=>i<sp?"rgba(201,168,76,.8)":"rgba(201,168,76,.32)"),
         borderColor:allM.map((_,i)=>i<sp?"#c9a84c":"rgba(201,168,76,.5)"),
         borderWidth:1.5,borderRadius:4},
        {label:"Occupancy %",data:cOcc,type:"line",yAxisID:"y2",
         borderColor:"rgba(74,159,212,.8)",backgroundColor:"transparent",
         borderWidth:2.5,pointRadius:4,pointBackgroundColor:allM.map((_,i)=>i<sp?"#4a9fd4":"rgba(74,159,212,.5)"),
         tension:.4}
      ]},
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{
          legend:{labels:{color:"#888",font:{family:"Inter",size:12},padding:16}},
          tooltip:{backgroundColor:"#1a1a1a",borderColor:"#333",borderWidth:1,
            titleColor:"#f5f3ee",bodyColor:"#999",
            callbacks:{label:c=>c.datasetIndex===0?`EGP ${c.raw.toLocaleString()}`:`${c.raw}% occupancy`}}
        },
        scales:{
          x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#666",font:{family:"Inter",size:10}}},
          y:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#888",font:{family:"Inter",size:10},callback:v=>"EGP "+v.toLocaleString()}},
          y2:{position:"right",grid:{display:false},ticks:{color:"#4a9fd4",font:{family:"Inter",size:10},callback:v=>v+"%"},min:0,max:100}
        }
      }
    });
  },100);

  document.getElementById("loading").classList.add("hide");
  document.getElementById("report").classList.add("show");
}
</script>
</body>
