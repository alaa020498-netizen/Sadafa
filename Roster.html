<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Roster – June 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: #2a2a30;
    --morning: #1a3a2a;
    --morning-text: #4ade80;
    --morning-border: #2d6a45;
    --night: #1a1a3a;
    --night-text: #818cf8;
    --night-border: #3a3a6a;
    --custom-text: #fbbf24;
    --custom-bg: #2a1f0a;
    --custom-border: #6a4f1a;
    --dayoff: #1a1a1c;
    --dayoff-text: #555560;
    --weekend: #111114;
    --accent: #c9a84c;
    --text: #e8e8f0;
    --muted: #666672;
    --header-bg: #1c1c22;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-left .month-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .header-left h1 { font-size: 38px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .header-left h1 span { color: var(--accent); }

  .legend { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted);
  }

  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  #errorMsg {
    display: none;
    text-align: center;
    padding: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #f87171;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 8px;
    margin-bottom: 16px;
  }

  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }

  table { border-collapse: collapse; width: 100%; min-width: 760px; }

  thead tr:first-child th {
    background: var(--header-bg); padding: 14px 0 12px;
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--muted); font-family: 'JetBrains Mono', monospace;
    font-weight: 500; border-bottom: 1px solid var(--border); text-align: center;
  }
  thead tr:first-child th:first-child { text-align: left; padding-left: 16px; width: 90px; }

  thead tr:nth-child(2) th {
    background: var(--surface); padding: 10px 6px; font-size: 13px;
    font-weight: 700; letter-spacing: 0.04em; color: var(--text);
    border-bottom: 2px solid var(--accent); text-align: center;
  }
  thead tr:nth-child(2) th:first-child {
    text-align: left; padding-left: 16px; color: var(--muted);
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody tr.weekend { background: var(--weekend); }
  tbody tr.weekend:hover { background: rgba(255,255,255,0.015); }

  td.date-cell {
    padding: 6px 8px 6px 16px; font-family: 'JetBrains Mono', monospace;
    vertical-align: middle; white-space: nowrap;
  }
  .date-num { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1; }
  .date-day { font-size: 9px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }
  .weekend .date-num { color: var(--muted); }
  .weekend .date-day { color: #444450; }

  td.shift-cell { padding: 5px 4px; text-align: center; vertical-align: middle; }

  .shift-badge {
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 6px; padding: 5px 8px; min-width: 72px; min-height: 44px;
    border: 1px solid transparent; font-family: 'JetBrains Mono', monospace;
  }
  .shift-badge .shift-type {
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; line-height: 1.2; text-align: center;
  }

  .morning { background: var(--morning);   border-color: var(--morning-border); color: var(--morning-text); }
  .night   { background: var(--night);     border-color: var(--night-border);   color: var(--night-text); }
  .custom  { background: var(--custom-bg); border-color: var(--custom-border);  color: var(--custom-text); }
  .dayoff  { background: var(--dayoff);    border-color: #222228;               color: var(--dayoff-text); }

  tr.today { background: rgba(201, 168, 76, 0.06) !important; }
  tr.today td.date-cell .date-num { color: var(--accent); }
  tr.today td.date-cell::before { content: '▶'; font-size: 8px; color: var(--accent); margin-right: 4px; }

  .footer {
    margin-top: 20px; display: flex; justify-content: space-between;
    align-items: center; padding: 0 4px;
  }
  .footer-note { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--muted); }
  .footer-brand { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="month-label">Staff Roster</div>
    <h1>June <span>2026</span></h1>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#2d6a45"></div> Morning</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3a3a6a"></div> Night</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6a4f1a"></div> Custom time</div>
    <div class="legend-item"><div class="legend-dot" style="background:#222228"></div> Day Off</div>
  </div>
</div>

<div id="errorMsg"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Date</th><th>Alaa</th><th>Laila</th><th>Jons</th><th>Amany</th><th>Yasmine</th>
      </tr>
      <tr>
        <th>—</th><th>Alaa</th><th>Laila</th><th>Jons</th><th>Amany</th><th>Yasmine</th>
      </tr>
    </thead>
    <tbody id="rosterBody">
      <tr><td colspan="6" style="text-align:center;padding:40px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#666672">Loading shifts...</td></tr>
    </tbody>
  </table>
</div>

<div class="footer">
  <span class="footer-note">June 2026 · Sadafa Roster</span>
  <span class="footer-brand">Sadafa</span>
</div>

<script>
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const STAFF = ['alaa','laila','jons','amany','yasmine'];
  let shifts = {};

  function badgeHTML(shift) {
    const map = {
      morning: { cls:'morning', label:'Morning' },
      night:   { cls:'night',   label:'Night' },
      dayoff:  { cls:'dayoff',  label:'Day Off' },
      custom:  { cls:'custom',  label: shift.time || 'Custom' },
    };
    const s = map[shift.type] || map.dayoff;
    return `<div class="shift-badge ${s.cls}"><span class="shift-type">${s.label}</span></div>`;
  }

  function buildTable() {
    const tbody = document.getElementById('rosterBody');
    tbody.innerHTML = '';
    const now = new Date();
    const todayDay = (now.getFullYear() === 2026 && now.getMonth() === 5) ? now.getDate() : -1;

    for (let d = 1; d <= 30; d++) {
      const date = new Date(2026, 5, d);
      const dayName = DAYS[date.getDay()];
      const isWeekend = date.getDay() === 5 || date.getDay() === 6;

      const tr = document.createElement('tr');
      if (isWeekend) tr.classList.add('weekend');
      if (d === todayDay) tr.classList.add('today');

      let html = `<td class="date-cell">
        <div class="date-num">${String(d).padStart(2,'0')}</div>
        <div class="date-day">${dayName}</div>
      </td>`;

      for (const name of STAFF) {
        const shift = shifts[`${name}_${d}`] || { type:'dayoff' };
        html += `<td class="shift-cell">${badgeHTML(shift)}</td>`;
      }

      tr.innerHTML = html;
      tbody.appendChild(tr);
    }
  }

  async function loadShifts() {
    try {
      const res = await fetch('shifts.json?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      shifts = await res.json();
      buildTable();
    } catch(e) {
      const err = document.getElementById('errorMsg');
      err.style.display = 'block';
      err.textContent = '⚠️ Could not load shifts.json — make sure both files are in the same GitHub repo folder.';
      buildTable();
    }
  }

  loadShifts();
</script>
</body>
</html>
